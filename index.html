<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>バレーボール 試合管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f0; color: #111; }
#app { max-width: 480px; margin: 0 auto; padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 12px; }
.panel { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.panel-title { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
.btn { background: transparent; border: 1px solid #ddd; border-radius: 10px; padding: 9px 16px; font-size: 14px; cursor: pointer; color: #333; font-family: inherit; -webkit-appearance: none; }
.btn:active { opacity: 0.7; }
.btn-primary { background: #185FA5; border-color: #185FA5; color: white; }
.btn-line { background: #06C755; border-color: #06C755; color: white; font-weight: 600; font-size: 15px; padding: 13px 16px; }
.btn-danger-soft { border-color: #ddd; color: #999; font-size: 12px; }
.team-names { display: flex; flex-direction: column; gap: 8px; }
.team-name-row { display: flex; align-items: center; gap: 10px; }
.team-name-label { font-size: 12px; font-weight: 600; width: 52px; flex-shrink: 0; }
.team-name-label.our { color: #185FA5; }
.team-name-label.them { color: #A32D2D; }
.team-names input { flex: 1; height: 40px; font-size: 15px; padding: 0 12px; border: 1px solid #ddd; border-radius: 10px; background: white; color: #111; font-family: inherit; font-weight: 600; }
.team-names input:focus { outline: none; }
.team-names input.our-input:focus { border-color: #185FA5; }
.team-names input.them-input:focus { border-color: #A32D2D; }
.member-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.save-badge { font-size: 11px; color: #3B6D11; display: flex; align-items: center; gap: 4px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; }
#member-row { display: flex; gap: 8px; }
#member-row input { flex: 1; height: 42px; font-size: 16px; padding: 0 12px; border: 1px solid #ddd; border-radius: 10px; background: white; color: #111; font-family: inherit; }
#member-row input:focus { outline: none; border-color: #185FA5; }
#member-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; border: 1px solid #e8e8e8; font-size: 14px; background: #f8f8f8; color: #333; user-select: none; white-space: nowrap; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip-x { color: #bbb; cursor: pointer; font-size: 13px; margin-left: 2px; }
.tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 16px; }
.tab { flex: 1; padding: 10px 4px; font-size: 13px; cursor: pointer; color: #999; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; font-family: inherit; text-align: center; }
.tab.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 600; }
#scoreboard { display: flex; border-radius: 14px; overflow: hidden; border: 1px solid #eee; margin-bottom: 14px; }
.score-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 8px; gap: 12px; }
.score-side.our  { background: #EBF4FD; }
.score-side.them { background: #FDEBEB; }
.score-team { font-size: 13px; font-weight: 700; color: #555; max-width: 120px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-num { font-size: 72px; font-weight: 700; line-height: 1; min-width: 90px; text-align: center; }
.score-num.our  { color: #0C447C; }
.score-num.them { color: #7A1F1F; }
.score-btns { display: flex; gap: 10px; }
.sbtn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #333; font-family: inherit; }
.sbtn:active { transform: scale(0.9); }
.sbtn.plus-our  { background: #185FA5; border-color: #185FA5; color: white; }
.sbtn.plus-them { background: #A32D2D; border-color: #A32D2D; color: white; }
.score-divider { width: 1px; background: #eee; }
.set-info { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
.set-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #f5f5f5; color: #666; border: 1px solid #eee; }
.set-history { background: #f8f8f8; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
.set-history-title { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 6px; }
.set-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #eee; }
.set-row:last-child { border-bottom: none; }
.set-row-label { color: #888; }
.set-row-score.win { color: #185FA5; font-weight: 700; }
.set-row-score.lose { color: #A32D2D; font-weight: 700; }
.log-area { max-height: 120px; overflow-y: auto; background: #f8f8f8; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #666; line-height: 2; -webkit-overflow-scrolling: touch; }
.log-entry { display: flex; gap: 6px; }
.lnum { color: #bbb; min-width: 22px; }
.log-our  { color: #185FA5; font-weight: 600; }
.log-them { color: #A32D2D; font-weight: 600; }
.log-src  { font-size: 11px; color: #bbb; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; }
.modal-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 14px; }
#share-preview-wrap { border-radius: 12px; overflow: hidden; margin-bottom: 14px; background: #111; }
#share-canvas { display: block; width: 100%; height: auto; }
.modal-btns { display: flex; flex-direction: column; gap: 10px; }
.ie-block-title { font-size: 14px; font-weight: 600; color: #333; margin: 14px 0 4px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
.ie-block-title:first-child { margin-top: 0; border-top: none; padding-top: 0; }
.ie-hint { font-size: 11px; color: #aaa; margin-bottom: 10px; line-height: 1.6; }
.ie-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.ie-table th { font-size: 11px; font-weight: 600; color: #999; text-align: center; padding: 6px 2px; border-bottom: 1px solid #f0f0f0; }
.ie-table th:first-child { text-align: left; }
.ie-table td { padding: 10px 2px; text-align: center; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.ie-table td:first-child { text-align: left; font-size: 13px; }
.ie-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: #555; font-family: inherit; }
.ie-btn:active { transform: scale(0.9); }
.ie-btn.p { background: #EAF3DE; border-color: #aad47a; color: #3B6D11; }
.ie-btn.m { background: #f8f8f8; }
.ie-val { display: inline-block; min-width: 28px; text-align: center; font-weight: 700; font-size: 16px; }
.pos { color: #3B6D11; } .neg { color: #A32D2D; } .zero { color: #bbb; }
.summary-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.scard { flex: 1 1 60px; background: #f8f8f8; border-radius: 12px; padding: 10px 8px; text-align: center; }
.scard .sl { font-size: 10px; color: #999; margin-bottom: 4px; line-height: 1.4; }
.scard .sv { font-size: 22px; font-weight: 700; }
#court { border-radius: 12px; display: block; touch-action: none; }
#court-area { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.bench-box { background: #f8f8f8; border: 2px dashed #ddd; border-radius: 12px; min-height: 56px; padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
.safe-bottom { height: env(safe-area-inset-bottom, 20px); }
</style>
</head>
<body>
<div id="app">
  <div class="panel">
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px;"><span id="sync-status" style="font-size:11px;color:#888;cursor:pointer;text-decoration:underline dotted;" onclick="onSyncStatusTap()">🔄 接続中...</span></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('score',this)">スコア</button>
      <button class="tab" onclick="showTab('ie',this)">サーブ</button>
      <button class="tab" onclick="showTab('formation',this)">設定</button>
    </div>

    <div id="score-section">
      <div class="set-info" id="set-info"></div>
      <div id="scoreboard">
        <div class="score-side our">
          <div class="score-team" id="score-our-name">自チーム</div>
          <div class="score-num our" id="our-score">0</div>
          <div class="score-btns">
            <button class="sbtn" onclick="addPoint('our',-1)" style="width:28px;height:28px;font-size:14px;opacity:0.5;">↩</button>
            <button class="sbtn plus-our" onclick="addPoint('our',1)">＋</button>
          </div>
        </div>
        <div class="score-divider"></div>
        <div class="score-side them">
          <div class="score-team" id="score-them-name">相手チーム</div>
          <div class="score-num them" id="them-score">0</div>
          <div class="score-btns">
            <button class="sbtn" onclick="addPoint('them',-1)" style="width:28px;height:28px;font-size:14px;opacity:0.5;">↩</button>
            <button class="sbtn plus-them" onclick="addPoint('them',1)">＋</button>
          </div>
        </div>
      </div>
      <div class="set-history" id="set-history" style="display:none;">
        <div class="set-history-title">セット結果</div>
        <div id="set-history-body"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <button class="btn" onclick="endSet()">セット終了</button>
        <button class="btn" onclick="resetAll()">全リセット</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <button class="btn btn-primary" onclick="manualPush()" style="font-size:13px;">☁️ データを保存</button>
        <label class="btn" style="font-size:13px;cursor:pointer;">📂 読み込み<input type="file" accept=".json" onchange="loadMatchJSON(event)" style="display:none;"></label>
      </div>
      <div class="panel-title">得点ログ</div>
      <div class="log-area" id="log-area"><span style="color:#bbb">まだ得点がありません</span></div>
    </div>

    <div id="ie-section" style="display:none;">
      <!-- 自チームサーブ中ブロック -->
      <div id="ie-block-our" style="border-radius:14px;border:3px solid #185FA5;background:#EBF4FD;padding:14px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:700;color:#185FA5;" id="ie-our-serve-label">🏐 自チームサーブ中</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="font-size:22px;font-weight:700;color:#0C447C;" id="ie-our-score">0</div>
            <span style="font-size:14px;color:#888;">-</span>
            <div style="font-size:22px;font-weight:700;color:#7A1F1F;" id="ie-them-score-our">0</div>
          </div>
        </div>
        <table class="ie-table">
          <thead><tr>
            <th style="font-size:11px;width:34%;">選手</th>
            <th style="font-size:11px;">✅ 決まった<br><span style="color:#3B6D11;font-size:10px;">自+1</span></th>
            <th style="font-size:11px;">❌ 取られた<br><span style="color:#A32D2D;font-size:10px;">相手+1</span></th>
            <th style="font-size:11px;">IE</th>
          </tr></thead>
          <tbody id="ie-serve-body"></tbody>
        </table>
      </div>

      <!-- 相手サーブ中ブロック -->
      <div id="ie-block-them" style="border-radius:14px;border:1px solid #ddd;background:#f8f8f8;padding:12px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:700;color:#999;" id="ie-them-serve-label">相手サーブ中</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="font-size:22px;font-weight:700;color:#0C447C;" id="ie-our-score-them">0</div>
            <span style="font-size:14px;color:#888;">-</span>
            <div style="font-size:22px;font-weight:700;color:#7A1F1F;" id="ie-them-score">0</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="recv-ok-btn" style="flex:1;padding:14px 8px;border-radius:12px;border:2px solid #3B6D11;background:#EAF3DE;font-size:13px;font-weight:700;color:#3B6D11;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;" onclick="changeRecvOk(1)">
            <span style="font-size:22px;">✅</span>カット成功
            <span style="font-size:10px;color:#3B6D11;font-weight:400;">自+1・権戻る</span>
            <span style="font-size:16px;font-weight:700;" id="recv-ok-val">0</span>
          </button>
          <button id="recv-loss-btn" style="flex:1;padding:14px 8px;border-radius:12px;border:2px solid #A32D2D;background:#FCEBEB;font-size:13px;font-weight:700;color:#A32D2D;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;" onclick="changeRecvLoss2(1)">
            <span style="font-size:22px;">❌</span>カット失敗
            <span style="font-size:10px;color:#A32D2D;font-weight:400;">相手+1</span>
            <span style="font-size:16px;font-weight:700;" id="recv-loss-val">0</span>
          </button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button style="flex:1;padding:7px;border-radius:8px;border:1px solid #ddd;background:white;font-size:12px;color:#888;font-family:inherit;cursor:pointer;" onclick="changeRecvOk(-1)">✅ 取消</button>
          <button style="flex:1;padding:7px;border-radius:8px;border:1px solid #ddd;background:white;font-size:12px;color:#888;font-family:inherit;cursor:pointer;" onclick="changeRecvLoss2(-1)">❌ 取消</button>
        </div>
        <div id="recv-ok-btns" style="display:none;"></div>
        <div id="recv-loss-btns" style="display:none;"></div>
      </div>

      <div id="ie-set-scores" style="display:none;background:#f8f8f8;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" onclick="resetIE()">IEリセット</button>
        <button class="btn" onclick="copyIE()">コピー</button>
      </div>
    </div>

    <div id="formation-section" style="display:none;">
      <!-- 大会名・チーム名 -->
      <div style="margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f0f0;">
        <div class="panel-title" style="margin-bottom:8px;">大会名</div>
        <input id="tournament-name" type="text" placeholder="大会名（例：春季大会）" maxlength="20"
          style="width:100%;height:38px;font-size:14px;padding:0 12px;border:1px solid #ddd;border-radius:10px;background:white;color:#111;font-family:inherit;margin-bottom:12px;"
          oninput="saveTournament()" />
        <div class="panel-title" style="margin-bottom:8px;">チーム名</div>
        <div class="team-names">
          <div class="team-name-row">
            <span class="team-name-label our">自チーム</span>
            <input class="our-input" id="our-team-name" type="text" placeholder="チーム名" maxlength="12" value="自チーム" oninput="updateTeamNames()" />
          </div>
          <div class="team-name-row">
            <span class="team-name-label them">相手チーム</span>
            <input class="them-input" id="them-team-name" type="text" placeholder="チーム名" maxlength="12" value="相手チーム" oninput="updateTeamNames()" />
          </div>
        </div>
      </div>
      <!-- メンバー登録 -->
      <div style="margin-bottom:14px;">
        <div class="member-header">
          <span style="font-size:12px;font-weight:600;color:#888;letter-spacing:0.05em;">メンバー</span>
          <span class="save-badge" id="save-badge"><span class="save-dot"></span>自動保存</span>
        </div>
        <div id="member-row" style="display:flex;gap:8px;">
          <input id="name-input" type="text" placeholder="選手名（例：たなか）" maxlength="6" style="flex:1;height:42px;font-size:16px;padding:0 12px;border:1px solid #ddd;border-radius:10px;background:white;color:#111;font-family:inherit;" />
          <button class="btn btn-primary" onclick="addMember()">追加</button>
        </div>
        <div id="member-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;"></div>
        <div style="margin-top:10px;">
          <button class="btn btn-danger-soft" onclick="clearAllMembers()">メンバーを全削除</button>
        </div>
      </div>
      <div style="border-top:1px solid #f0f0f0;padding-top:14px;margin-bottom:10px;font-size:12px;font-weight:600;color:#888;letter-spacing:0.05em;">コート配置</div>
      <div id="court-area">
        <div style="flex-shrink:0;"><canvas id="court" width="260" height="380"></canvas></div>
        <div style="flex:1 1 120px;display:flex;flex-direction:column;gap:10px;">
          <div>
            <div class="panel-title" style="margin-bottom:6px;">控え</div>
            <div class="bench-box" id="bench"></div>
          </div>
        </div>
      </div>
      <div style="margin-top:10px;font-size:11px;color:#bbb;">タップで配置 / もう一度タップで控えに戻す</div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0;">
        <div class="panel-title" style="margin-bottom:8px;">サーブ順設定</div>
        <div style="font-size:11px;color:#bbb;margin-bottom:10px;">選手を配置後、サーブ順（1〜6）を設定してください</div>
        <div id="serve-order-list"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-primary" style="font-size:13px;" onclick="applyServeOrder()">サーブ順を確定</button>
          <button class="btn btn-danger-soft" style="font-size:13px;" onclick="resetServeOrder()">リセット</button>
        </div>
        <div style="font-size:11px;color:#bbb;margin-top:6px;" id="serve-order-status"></div>
      </div>
    </div>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- セット終了モーダル -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">第1セット 終了</div>
    <div style="display:flex;border-radius:14px;overflow:hidden;border:1px solid #eee;margin-bottom:12px;">
      <div style="flex:1;background:#EBF4FD;padding:16px 8px;text-align:center;">
        <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;" id="modal-our-name">自チーム</div>
        <div style="font-size:56px;font-weight:700;color:#0C447C;line-height:1;" id="modal-our-score">0</div>
      </div>
      <div style="flex:1;background:#FDEBEB;padding:16px 8px;text-align:center;">
        <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;" id="modal-them-name">相手</div>
        <div style="font-size:56px;font-weight:700;color:#7A1F1F;line-height:1;" id="modal-them-score">0</div>
      </div>
    </div>
    <div id="modal-sets-summary" style="font-size:13px;color:#888;text-align:center;margin-bottom:16px;line-height:1.8;"></div>
    <div class="modal-btns">
      <button class="btn btn-line" onclick="shareText()">📤 LINEで送る</button>
      <button class="btn btn-primary" onclick="goNextSet()">次のセットへ →</button>
      <button class="btn" onclick="closeModalOnly()">閉じる</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const STORAGE_KEY='vb_kids_members_v2';
const TEAM_KEY='vb_kids_teams';

let members=[],onCourt={},ieData={},recvLoss=0,recvOk=0,serveMode='our';
let serveOrder=[]; // [{name,order}] order=1〜6
let currentServerIdx=0; // serveOrder内の現在のインデックス
let selectedBench=null,currentTab='score';
let ourScore=0,themScore=0,sets=[],log=[];
let ourTeamName='自チーム',themTeamName='相手チーム';
let pendingSetResult=null;

function updateTeamNames(){
  ourTeamName=document.getElementById('our-team-name').value||'自チーム';
  themTeamName=document.getElementById('them-team-name').value||'相手チーム';
  document.getElementById('score-our-name').textContent=ourTeamName;
  document.getElementById('score-them-name').textContent=themTeamName;
  try{localStorage.setItem(TEAM_KEY,JSON.stringify({our:ourTeamName,them:themTeamName}));}catch(e){}
}
function saveTournament(){
  try{localStorage.setItem('vb_tournament',document.getElementById('tournament-name').value);}catch(e){}
}
function loadTournament(){
  try{const v=localStorage.getItem('vb_tournament');if(v)document.getElementById('tournament-name').value=v;}catch(e){}
}
function loadTeamNames(){
  try{
    const raw=localStorage.getItem(TEAM_KEY);
    if(raw){const t=JSON.parse(raw);document.getElementById('our-team-name').value=t.our||'自チーム';document.getElementById('them-team-name').value=t.them||'相手チーム';updateTeamNames();}
  }catch(e){}
}
function saveMembers(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(members));
    // コート配置・サーブ順も保存
    const courtData={};
    Object.keys(onCourt).forEach(k=>{courtData[k]=onCourt[k];});
    localStorage.setItem('vb_court',JSON.stringify(courtData));
    localStorage.setItem('vb_serve_order',JSON.stringify(serveOrder));
    flashSave();
  }catch(e){}
}
function loadMembers(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){JSON.parse(raw).forEach(m=>{members.push(m);if(!ieData[m.name])ieData[m.name]={plus:0,minus:0};});renderMemberList();}
    // コート配置を復元
    const courtRaw=localStorage.getItem('vb_court');
    if(courtRaw){
      const saved=JSON.parse(courtRaw);
      Object.keys(saved).forEach(k=>{
        const p=saved[k];
        if(members.find(m=>m.name===p.name)) onCourt[k]=p;
      });
    }
    // 控えに追加（コートにいない選手のみ）
    members.forEach(m=>{
      const onField=Object.values(onCourt).some(p=>p.name===m.name);
      if(!onField) addToBench(m.name);
    });
    // サーブ順を復元
    const soRaw=localStorage.getItem('vb_serve_order');
    if(soRaw) serveOrder=JSON.parse(soRaw);
  }catch(e){}
}
function flashSave(){const b=document.getElementById('save-badge');b.style.color='#3B6D11';setTimeout(()=>b.style.color='',1000);}
function clearAllMembers(){
  if(!confirm('メンバーを全削除しますか？'))return;
  members=[];onCourt={};ieData={};document.getElementById('bench').innerHTML='';
  renderMemberList();drawCourt();saveMembers();if(currentTab==='ie')renderIE();
}

function showTab(tab,el){
  currentTab=tab;
  ['score','ie','formation'].forEach(t=>{document.getElementById(t+'-section').style.display=t===tab?'':'none';});
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(tab==='ie')renderIE();
  if(tab==='formation')drawCourt();
}

function addPoint(side,delta,src){
  if(side==='our')ourScore=Math.max(0,ourScore+delta);
  else themScore=Math.max(0,themScore+delta);
  if(delta===1)log.unshift({side,our:ourScore,them:themScore,set:sets.length+1,src:src||''});
  else if(log.length)log.shift();
  updateScore();
  pushToSupabase();
}
function updateScore(){
  document.getElementById('our-score').textContent=ourScore;
  document.getElementById('them-score').textContent=themScore;
  // IEタブのスコアも同期
  ['ie-our-score','ie-our-score-them'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ourScore;});
  ['ie-them-score','ie-them-score-our'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=themScore;});
  updateServeMode(serveMode);
  updateSetInfo();updateLog();
}
function updateSetInfo(){
  const ow=sets.filter(s=>s.our>s.them).length,tw=sets.filter(s=>s.them>s.our).length;
  document.getElementById('set-info').innerHTML=
    '<span class="set-badge">第'+(sets.length+1)+'セット</span>'+
    '<span class="set-badge" style="background:#EBF4FD;color:#0C447C;border-color:#b3d4f5;">'+ourTeamName+' '+ow+'勝</span>'+
    '<span class="set-badge" style="background:#FDEBEB;color:#7A1F1F;border-color:#f5b3b3;">'+themTeamName+' '+tw+'勝</span>';
}
function updateLog(){
  const el=document.getElementById('log-area');
  if(!log.length){el.innerHTML='<span style="color:#bbb">まだ得点がありません</span>';return;}
  el.innerHTML=log.slice(0,40).map((e,i)=>{
    const label=e.side==='our'?`<span class="log-our">${ourTeamName}</span>`:`<span class="log-them">${themTeamName}</span>`;
    const s=e.src?`<span class="log-src">[${e.src}]</span>`:'';
    return `<div class="log-entry"><span class="lnum">${log.length-i}.</span>${label}${s} <b>${e.our}－${e.them}</b></div>`;
  }).join('');
}

// ---- SET END ----
function endSet(){
  pendingSetResult={our:ourScore,them:themScore,setNum:sets.length+1};
  document.getElementById('modal-title').textContent=`第${sets.length+1}セット 終了`;
  document.getElementById('modal-our-name').textContent=ourTeamName;
  document.getElementById('modal-them-name').textContent=themTeamName;
  document.getElementById('modal-our-score').textContent=ourScore;
  document.getElementById('modal-them-score').textContent=themScore;
  // 過去セット一覧
  const pastSets=[...sets,{our:ourScore,them:themScore}];
  const ow=pastSets.filter(s=>s.our>s.them).length;
  const tw=pastSets.filter(s=>s.them>s.our).length;
  let summary='';
  if(sets.length>0){
    summary=sets.map((s,i)=>'第'+(i+1)+'セット: '+s.our+'－'+s.them).join('　');
  }
  document.getElementById('modal-sets-summary').innerHTML=summary;

function buildShareText(){
  const r=pendingSetResult;
  const nl='\n';
  const tname=document.getElementById('tournament-name').value;
  let text=(tname?tname+' '+nl:'')+'\uD83C\uDFD0 第'+r.setNum+'セット'+nl;
  text+=ourTeamName+' '+r.our+' - '+r.them+' '+themTeamName+nl;

  // logは新しい順→古い順に逆転
  const chronolog=[...log].reverse();
  if(chronolog.length>0){
    text+=nl+'【得点経過】'+nl;
    // 各エントリを「表示カテゴリ」に変換してからまとめる
    // カテゴリ: 'player'=個人サーブ得点, 'them'=相手チーム得点(自サーブ失点含む), 'recvOur'=相手サーブ中自得点, 'recvThem'=相手サーブ中失点
    const entries=chronolog.map(e=>{
      // 自チームサーブで決まった → 個人
      if(e.side==='our'&&e.src&&e.src.indexOf('→相手')===-1&&e.src.indexOf('カット')===-1){
        const playerName=e.src.replace('サーブ','');
        return {cat:'player',name:playerName,our:e.our,them:e.them};
      }
      // 相手チーム得点（自サーブ失点 or 相手サーブ失点）
      if(e.side==='them'){
        return {cat:'them',name:themTeamName,our:e.our,them:e.them};
      }
      // 相手サーブ中自チーム得点
      if(e.side==='our'){
        return {cat:'recvOur',name:ourTeamName,our:e.our,them:e.them}; // カット成功
      }
      return {cat:'them',name:themTeamName,our:e.our,them:e.them};
    });

    // 連続する同カテゴリ・同名をまとめる
    const runs=[];
    entries.forEach(e=>{
      const last=runs[runs.length-1];
      if(last&&last.cat===e.cat&&last.name===e.name){
        last.count++;last.our=e.our;last.them=e.them;
      } else {
        runs.push({cat:e.cat,name:e.name,count:1,our:e.our,them:e.them});
      }
    });

    // 出力: シンプルに名前＋点数＋スコア
    // recvOurは直前のthemとまとめる（サーブ権移動は表示しない）
    const merged=[];
    runs.forEach(run=>{
      const last=merged[merged.length-1];
      if(run.cat==='recvOur'&&last&&last.cat==='them'){
        // 相手得点の後のカット成功はまとめてスコアだけ更新
        last.our=run.our;last.them=run.them;
      } else {
        merged.push(Object.assign({},run));
      }
    });
    merged.forEach(run=>{
      if(run.cat==='player'){
        const score='('+run.our+'-'+run.them+')';
        const balls='\uD83C\uDFD0'.repeat(run.count);
        text+=run.name+' '+balls+' '+score+nl;
      }
      // 個人名なしは省略
    });
  }

  // 過去セット
  if(sets.length>0){
    text+=nl+'【過去セット】'+nl;
    text+=sets.map((s,i)=>'第'+(i+1)+'セット: '+s.our+'-'+s.them).join(nl)+nl;
  }
  return text;
}

function shareText(){
  const text=buildShareText();
  if(navigator.share){
    navigator.share({title:`第${pendingSetResult.setNum}セット`,text}).catch(()=>{});
  } else {
    const encoded=encodeURIComponent(text);
    window.open(`https://line.me/R/msg/text/?${encoded}`,'_blank');
  }
}

function goNextSet(){
  if(pendingSetResult)sets.push({our:pendingSetResult.our,them:pendingSetResult.them});
  ourScore=0;themScore=0;log=[];pendingSetResult=null;
  document.getElementById('modal').style.display='none';
  updateScore();updateSetHistory();pushToSupabase();
}
function closeModalOnly(){document.getElementById('modal').style.display='none';}
function closeModal(e){if(e.target.id==='modal')closeModalOnly();}

function updateSetHistory(){
  const hist=document.getElementById('set-history'),body=document.getElementById('set-history-body');
  if(!sets.length){hist.style.display='none';return;}
  hist.style.display='';
  body.innerHTML=sets.map((s,i)=>{
    const cls=s.our>s.them?'win':s.them>s.our?'lose':'';
    return `<div class="set-row"><span class="set-row-label">第${i+1}セット</span><span class="set-row-score ${cls}">${s.our} - ${s.them}</span></div>`;
  }).join('');
}
function loadMatchJSON(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version){alert('形式が正しくありません');return;}
      if(!confirm('現在のデータを上書きして読み込みますか？'))return;

      // チーム名・大会名
      if(data.tournament){document.getElementById('tournament-name').value=data.tournament;saveTournament();}
      if(data.ourTeamName){document.getElementById('our-team-name').value=data.ourTeamName;}
      if(data.themTeamName){document.getElementById('them-team-name').value=data.themTeamName;}
      updateTeamNames();

      // スコア
      sets=data.sets||[];
      ourScore=data.currentScore?.our||0;
      themScore=data.currentScore?.them||0;
      log=data.log||[];

      // IE
      ieData=data.ieData||{};
      recvOk=data.recvOk||0;
      recvLoss=data.recvLoss||0;
      const ov=document.getElementById('recv-ok-val');if(ov)ov.textContent=recvOk;
      const lv=document.getElementById('recv-loss-val');if(lv)lv.textContent=recvLoss;

      // サーブ順
      serveOrder=data.serveOrder||[];

      updateScore();
      updateSetHistory();
      if(currentTab==='ie')renderIE();
      alert('読み込み完了しました');
    }catch(err){
      alert('読み込みに失敗しました: '+err.message);
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

function resetAll(){
  if(!confirm('全リセットしますか？'))return;
  ourScore=0;themScore=0;sets=[];log=[];pendingSetResult=null;
  updateScore();updateSetHistory();pushToSupabase();
}

function updateServeMode(mode){
  serveMode=mode;
  const blockOur=document.getElementById('ie-block-our');
  const blockThem=document.getElementById('ie-block-them');
  const labelOur=document.getElementById('ie-our-serve-label');
  const labelThem=document.getElementById('ie-them-serve-label');
  if(!blockOur||!blockThem)return;
  const isStart=ourScore===0&&themScore===0;
  if(isStart){
    // 0-0の試合開始直後: 両方有効、強調なし
    blockOur.style.border='1px solid #ddd';
    blockOur.style.background='#f8f8f8';
    blockOur.style.opacity='1';
    labelOur.textContent='自チームサーブ中';
    labelOur.style.color='#888';
    blockThem.style.border='1px solid #ddd';
    blockThem.style.background='#f8f8f8';
    blockThem.style.opacity='1';
    labelThem.textContent='相手サーブ中';
    labelThem.style.color='#888';
  } else if(mode==='our'){
    blockOur.style.border='3px solid #185FA5';
    blockOur.style.background='#EBF4FD';
    blockOur.style.opacity='1';
    const cs=getCurrentServer();
    labelOur.textContent='🏐 '+(cs?cs.name+'がサーブ中':'自チームサーブ中');
    labelOur.style.color='#185FA5';
    blockThem.style.border='1px solid #ddd';
    blockThem.style.background='#f8f8f8';
    blockThem.style.opacity='0.45';
    labelThem.textContent='相手サーブ中';
    labelThem.style.color='#999';
  } else {
    blockThem.style.border='3px solid #A32D2D';
    blockThem.style.background='#FDEBEB';
    blockThem.style.opacity='1';
    labelThem.textContent='🏐 相手サーブ中';
    labelThem.style.color='#A32D2D';
    blockOur.style.border='1px solid #ddd';
    blockOur.style.background='#f8f8f8';
    blockOur.style.opacity='0.45';
    labelOur.textContent='自チームサーブ中';
    labelOur.style.color='#999';
  }
  // テーブルの強調を更新
  renderServeHighlight();
}

function renderServeHighlight(){
  if(!document.getElementById('ie-serve-body'))return;
  const rows=document.getElementById('ie-serve-body').querySelectorAll('tr');
  const cs=getCurrentServer();
  rows.forEach(tr=>{
    // data-nameで完全一致判定
    const isHighlight=cs&&tr.dataset.membername===cs.name;
    tr.style.background=isHighlight?'#dbeeff':'';
    tr.style.borderLeft=isHighlight?'4px solid #185FA5':'';
    tr.style.borderRadius=isHighlight?'8px':'';
  });
}

function isInactive(){
  // 0-0は両方アクティブなので確認不要
  return ourScore===0&&themScore===0 ? false : true;
}

function changeIEServe(name,type,delta){
  // 相手サーブ中に自チームサーブを操作（加算・取消どちらも）
  if(serveMode==='them'&&isInactive()){
    if(!confirm('現在は相手サーブ中です。\n自チームサーブの操作をしますか？'))return;
    updateServeMode('our');
  }
  if(delta===1){
    // サーブ順でない人が決まったを押した場合
    const cs=getCurrentServer();
    if(type==='plus'&&serveOrder.length>0&&cs&&cs.name!==name){
      if(!confirm(cs.name+'がサーブ順ですが、'+name+'の「決まった」を記録しますか？'))return;
    }
  }
  if(!ieData[name])ieData[name]={plus:0,minus:0};
  ieData[name][type]=Math.max(0,ieData[name][type]+delta);
  if(delta===1){
    if(type==='plus')addPoint('our',1,name+'サーブ');
    if(type==='minus'){addPoint('them',1,name+'→相手');advanceServer();updateServeMode('them');}
  } else {
    if(type==='plus'&&ourScore>0)addPoint('our',-1);
    if(type==='minus'&&themScore>0){addPoint('them',-1);currentServerIdx=Math.max(0,currentServerIdx-1);updateServeMode('our');}
  }
  renderIE();
}

function changeRecvOk(delta){
  // 自チームサーブ中に相手サーブブロックを操作（加算・取消どちらも）
  if(serveMode==='our'&&isInactive()){
    if(!confirm('現在は自チームサーブ中です。\n相手サーブ中の操作をしますか？'))return;
    updateServeMode('them');
  }
  recvOk=Math.max(0,recvOk+delta);
  document.getElementById('recv-ok-val').textContent=recvOk;
  if(delta===1){addPoint('our',1,'相手サーブ→カット成功');updateServeMode('our');}
  else if(ourScore>0){addPoint('our',-1);updateServeMode('them');}
}

function changeRecvLoss2(delta){
  // 自チームサーブ中に相手サーブブロックを操作（加算・取消どちらも）
  if(serveMode==='our'&&isInactive()){
    if(!confirm('現在は自チームサーブ中です。\n相手サーブ中の操作をしますか？'))return;
    updateServeMode('them');
  }
  recvLoss=Math.max(0,recvLoss+delta);
  document.getElementById('recv-loss-val').textContent=recvLoss;
  if(delta===1)addPoint('them',1,'相手サーブ→カット失敗');
  else if(themScore>0)addPoint('them',-1);
}

function renderIE(){
  // 現在スコア
  ['ie-our-score','ie-our-score-them'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ourScore;});
  ['ie-them-score','ie-them-score-our'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=themScore;});
  // サーブ権表示
  updateServeMode(serveMode);
  // セット別スコア表示
  const setScoreEl=document.getElementById('ie-set-scores');
  if(sets.length>0){
    setScoreEl.style.display='';
    setScoreEl.innerHTML='<div style="font-size:11px;color:#999;font-weight:600;margin-bottom:4px;">セット結果</div>'+
      sets.map((s,i)=>{
        const cls=s.our>s.them?'color:#185FA5;font-weight:700':s.them>s.our?'color:#A32D2D;font-weight:700':'color:#888';
        return '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #eee;font-size:13px;"><span style="color:#888">第'+(i+1)+'セット</span><span style="'+cls+'">'+s.our+' - '+s.them+'</span></div>';
      }).join('');
  } else {
    setScoreEl.style.display='none';
  }
  // サーブIE
  const body=document.getElementById('ie-serve-body');
  if(!members.length){
    body.innerHTML='<tr><td colspan="4" style="text-align:center;padding:16px;color:#bbb;">先にメンバーを登録してください</td></tr>';
    document.getElementById('ie-recv-body').innerHTML='<tr><td colspan="3" style="text-align:center;padding:12px;color:#bbb;">—</td></tr>';
    return;
  }
  const currentServer=getCurrentServer();
  body.innerHTML='';
  members.forEach(m=>{
    const d=ieData[m.name]||{plus:0,minus:0};
    const ie=d.plus-d.minus,cls=ie>0?'pos':ie<0?'neg':'zero';
    const isCurrentServer=serveMode==='our'&&currentServer&&currentServer.name===m.name;
    const so=serveOrder.find(s=>s.name===m.name);
    const tr=document.createElement('tr');
    if(isCurrentServer){
      tr.style.cssText='background:#dbeeff;border-left:4px solid #185FA5;border-radius:8px;';
    }
    const orderBadge=so?'<span style="font-size:10px;background:#185FA5;color:white;border-radius:10px;padding:1px 5px;margin-right:4px;">'+so.order+'</span>':'';
    const serverIcon=isCurrentServer?'🏐 ':'';
    const dot='<span class="chip-dot" style="background:'+m.color+';display:inline-block;vertical-align:middle;margin-right:4px;"></span>';
    // ✅決まった（大ボタン）と ↩取消（小ボタン）
    // ✅ボタン＋↩（横並び）
    const btnOk=document.createElement('button');
    btnOk.style.cssText='height:36px;padding:0 10px;border-radius:8px;border:2px solid #3B6D11;background:#EAF3DE;font-size:13px;font-weight:700;color:#3B6D11;font-family:inherit;cursor:pointer;';
    btnOk.textContent='✅ '+d.plus;
    btnOk.onclick=()=>changeIEServe(m.name,'plus',1);
    const btnOkUndo=document.createElement('button');
    btnOkUndo.style.cssText='height:36px;width:32px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;font-size:13px;color:#aaa;font-family:inherit;cursor:pointer;';
    btnOkUndo.textContent='↩';btnOkUndo.onclick=()=>changeIEServe(m.name,'plus',-1);
    // ❌ボタン＋↩（横並び）
    const btnNg=document.createElement('button');
    btnNg.style.cssText='height:36px;padding:0 10px;border-radius:8px;border:2px solid #A32D2D;background:#FCEBEB;font-size:13px;font-weight:700;color:#A32D2D;font-family:inherit;cursor:pointer;';
    btnNg.textContent='❌ '+d.minus;
    btnNg.onclick=()=>changeIEServe(m.name,'minus',1);
    const btnNgUndo=document.createElement('button');
    btnNgUndo.style.cssText='height:36px;width:32px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;font-size:13px;color:#aaa;font-family:inherit;cursor:pointer;';
    btnNgUndo.textContent='↩';btnNgUndo.onclick=()=>changeIEServe(m.name,'minus',-1);

    tr.dataset.membername=m.name;
    tr.innerHTML='<td style="font-size:13px;padding:6px 4px;">'+dot+orderBadge+m.name+'</td><td style="padding:4px 2px;white-space:nowrap;"></td><td style="padding:4px 2px;white-space:nowrap;"></td><td style="font-size:14px;font-weight:700;text-align:center;padding:4px 2px;" class="'+cls+'">'+(ie>0?'+':'')+ie+'</td>';
    const cells=tr.querySelectorAll('td');
    const wrapOk=document.createElement('div');wrapOk.style.cssText='display:flex;gap:3px;align-items:center;';
    wrapOk.appendChild(btnOk);wrapOk.appendChild(btnOkUndo);cells[1].appendChild(wrapOk);
    const wrapNg=document.createElement('div');wrapNg.style.cssText='display:flex;gap:3px;align-items:center;';
    wrapNg.appendChild(btnNg);wrapNg.appendChild(btnNgUndo);cells[2].appendChild(wrapNg);
    body.appendChild(tr);
  });
}

function resetIE(){members.forEach(m=>{ieData[m.name]={plus:0,minus:0};});recvLoss=0;recvOk=0;const ov=document.getElementById('recv-ok-val');if(ov)ov.textContent='0';document.getElementById('recv-loss-val').textContent='0';renderIE();}
function copyIE(){
  const lines=[`【サーブ IE】${ourTeamName} vs ${themTeamName}`,''];
  let tp=0,tm=0;
  members.forEach(m=>{const d=ieData[m.name]||{plus:0,minus:0},ie=d.plus-d.minus;lines.push(`${m.name}: 決+${d.plus} 取-${d.minus} IE${ie>=0?'+':''}${ie}`);tp+=d.plus;tm+=d.minus;});
  const ti=tp-tm;lines.push('');lines.push(`チーム: +${tp} -${tm} IE${ti>=0?'+':''}${ti}`);lines.push('相手サーブ中: 得点 +'+recvOk+'  失点 -'+recvLoss);
  const text=lines.join('\n');
  if(navigator.share)navigator.share({title:'サーブIE',text}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('コピーしました'));
}

function addMember(){
  const inp=document.getElementById('name-input'),name=inp.value.trim();
  if(!name)return;
  if(members.find(m=>m.name===name)){alert('同じ名前がいます');return;}
  const color=COLORS[members.length%COLORS.length];
  members.push({name,color});
  if(!ieData[name])ieData[name]={plus:0,minus:0,recvOk:0,recvNg:0};
  inp.value='';inp.blur();
  renderMemberList();addToBench(name);saveMembers();
  if(currentTab==='ie')renderIE();
}
function removeMember(name){
  members=members.filter(m=>m.name!==name);

  removeBenchChip(name);renderMemberList();drawCourt();saveMembers();

}

// ---- SERVE ORDER ----
function renderServeOrderList(){
  const list=document.getElementById('serve-order-list');
  if(!list)return;
  const courtPlayers=Object.values(onCourt).map(p=>p.name);
  if(!courtPlayers.length){list.innerHTML='<div style="font-size:12px;color:#bbb;">先に選手をコートに配置してください</div>';return;}
  list.innerHTML='';
  courtPlayers.forEach(name=>{
    const existing=serveOrder.find(s=>s.name===name);
    const currentOrder=existing?existing.order:'';
    const m=members.find(m=>m.name===name);
    const color=m?m.color:'#888';
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0;';
    // 他の選手が使用済みの番号を取得
    const usedByOthers=new Set(
      courtPlayers.filter(n=>n!==name)
        .map(n=>{ const s=serveOrder.find(x=>x.name===n); return s?s.order:null; })
        .filter(Boolean)
    );
    const options='<option value="">-</option>'+
      [1,2,3,4,5,6]
        .filter(n=>!usedByOthers.has(n)||n==currentOrder)
        .map(n=>'<option value="'+n+'"'+(currentOrder==n?' selected':'')+'>'+n+'</option>')
        .join('');
    row.innerHTML=
      '<span class="chip-dot" style="background:'+color+';display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span>'+
      '<span style="flex:1;font-size:14px;">'+name+'</span>'+
      '<select data-name="'+name+'" onchange="onServeOrderChange(this)" style="width:60px;height:34px;border:1px solid #ddd;border-radius:8px;font-size:14px;text-align:center;font-family:inherit;">'+options+'</select>';
    list.appendChild(row);
  });
}

function onServeOrderChange(sel){
  const name=sel.dataset.name;
  const val=parseInt(sel.value);
  if(!isNaN(val)){
    const existing=serveOrder.find(s=>s.name===name);
    if(existing)existing.order=val;
    else serveOrder.push({name,order:val});
  } else {
    serveOrder=serveOrder.filter(s=>s.name!==name);
  }
  // 他のセレクトを再描画（使用済み番号を更新）
  renderServeOrderList();
}

function resetServeOrder(){
  serveOrder=[];currentServerIdx=0;
  renderServeOrderList();drawCourt();saveMembers();
  const st=document.getElementById('serve-order-status');
  if(st){st.textContent='サーブ順をリセットしました';st.style.color='#888';}
}
function applyServeOrder(){
  const list=document.getElementById('serve-order-list');
  if(!list)return;
  const selects=list.querySelectorAll('select');
  const newOrder=[];
  let valid=true;
  const usedNums=new Set();
  selects.forEach(sel=>{
    const name=sel.dataset.name;
    const val=parseInt(sel.value);
    if(!isNaN(val)&&val>=1&&val<=6){
      if(usedNums.has(val)){valid=false;}
      usedNums.add(val);
      newOrder.push({name,order:val});
    }
  });
  if(!valid){
    document.getElementById('serve-order-status').textContent='⚠ 同じ番号が重複しています';
    document.getElementById('serve-order-status').style.color='#A32D2D';
    return;
  }
  // 番号順にソート
  newOrder.sort((a,b)=>a.order-b.order);
  serveOrder=newOrder;
  currentServerIdx=0;
  document.getElementById('serve-order-status').textContent='✓ サーブ順を確定しました（'+newOrder.map(s=>s.order+'.'+s.name).join(' → ')+')';
  document.getElementById('serve-order-status').style.color='#3B6D11';
  drawCourt();
  saveMembers();
  if(currentTab==='ie')renderIE();
}

function getCurrentServer(){
  if(!serveOrder.length)return null;
  return serveOrder[currentServerIdx%serveOrder.length];
}

function advanceServer(){
  if(!serveOrder.length)return;
  currentServerIdx=(currentServerIdx+1)%serveOrder.length;
}

function resetServer(){
  currentServerIdx=0;
}

function drawCourt(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#2d7a3a';rr(ctx,0,0,CW,CH,12);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(12,12,CW-24,CH*0.5-12);
  ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.5;ctx.strokeRect(12,12,CW-24,CH-24);
  ctx.lineWidth=4;ctx.strokeStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();ctx.moveTo(12,CH*0.5);ctx.lineTo(CW-12,CH*0.5);ctx.stroke();
  ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(12,CH*0.68);ctx.lineTo(CW-12,CH*0.68);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('相手コート',CW/2,CH*0.27);ctx.fillText('自チーム',CW/2,CH*0.91);
  POSITIONS.forEach(p=>{
    const x=p.x*CW,y=p.y*CH,pl=onCourt[p.id];
    ctx.beginPath();ctx.arc(x,y,28,0,Math.PI*2);
    ctx.fillStyle=pl?pl.color:'rgba(0,0,0,0.28)';ctx.fill();
    ctx.strokeStyle=pl?'white':'rgba(255,255,255,0.4)';ctx.lineWidth=pl?2.5:1.5;ctx.stroke();
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(pl){
      ctx.fillStyle='white';ctx.font='bold 12px sans-serif';ctx.fillText(pl.name.slice(0,5),x,y-5);
      // サーブ順番号
      const so=serveOrder.find(s=>s.name===pl.name);
      if(so){
        ctx.font='bold 10px sans-serif';ctx.fillStyle='rgba(255,255,0,0.95)';
        ctx.fillText(so.order,x+18,y-18);
      }
    } else {
      ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='bold 14px sans-serif';ctx.fillText(p.label,x,y-3);
      ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillText('空き',x,y+10);
    }
    ctx.textBaseline='alphabetic';
  });
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}
function posAt(cx,cy){for(const p of POSITIONS){const x=p.x*CW,y=p.y*CH;if(Math.hypot(cx-x,cy-y)<34)return p.id;}return -1;}
function handleCourtTap(cx,cy){
  const idx=posAt(cx,cy);if(idx<0)return;
  if(onCourt[idx]){
    addToBench(onCourt[idx].name);delete onCourt[idx];drawCourt();renderServeOrderList();saveMembers();
  } else if(selectedBench){
    const m=members.find(m=>m.name===selectedBench);
    if(m){
      Object.keys(onCourt).forEach(k=>{if(onCourt[k].name===m.name)delete onCourt[k];});
      onCourt[idx]={name:m.name,color:m.color};
      removeBenchChip(m.name);
      selectedBench=null;clearBenchSelection();drawCourt();renderServeOrderList();saveMembers();
    }
  }
}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleCourtTap((e.clientX-r.left)*(CW/r.width),(e.clientY-r.top)*(CH/r.height));});
canvas.addEventListener('touchend',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];handleCourtTap((t.clientX-r.left)*(CW/r.width),(t.clientY-r.top)*(CH/r.height));},{passive:false});
function clearBenchSelection(){document.getElementById('bench').querySelectorAll('.chip').forEach(c=>c.style.outline='');selectedBench=null;}
function addToBench(name){if(!document.getElementById('bench').querySelector(`[data-name="${name}"]`))renderBenchChip(name);}
function removeBenchChip(name){const c=document.getElementById('bench').querySelector(`[data-name="${name}"]`);if(c)c.remove();}
function renderBenchChip(name){
  const m=members.find(m=>m.name===name);if(!m)return;
  const chip=document.createElement('div');chip.className='chip';chip.dataset.name=name;chip.style.cursor='pointer';
  chip.innerHTML=`<span class="chip-dot" style="background:${m.color}"></span>${name}`;
  chip.addEventListener('click',()=>{if(selectedBench===name){clearBenchSelection();}else{clearBenchSelection();selectedBench=name;chip.style.outline='2px solid #185FA5';}});
  document.getElementById('bench').appendChild(chip);
}

function checkPassphrase(){
  const saved=localStorage.getItem('vb_pass');
  if(saved===PASSPHRASE){ initSupabase(); return; }
  if(saved===PASSPHRASE_VIEW){ startViewMode(); return; }
  updateSyncUI('error');
  document.getElementById('sync-status').textContent='🔴 タップして接続';
}

function onSyncStatusTap(){
  if(syncEnabled||viewMode)return;
  const val=window.prompt('合言葉を入力してください');
  if(val===null)return;
  if(val===PASSPHRASE){
    localStorage.setItem('vb_pass',PASSPHRASE);
    updateSyncUI('connecting');
    initSupabase();
  } else if(val===PASSPHRASE_VIEW){
    localStorage.setItem('vb_pass_view',PASSPHRASE_VIEW);
    startViewMode();
  } else if(val!==''){
    alert('合言葉が違います');
  }
}

async function fetchAndApply(){
  if(!sbClient){
    sbClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  try{
    const {data,error}=await sbClient.from('match_data').select('data').eq('id','current').single();

async function initSupabase(){
  try{
    sbClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    updateSyncUI('connecting');
    // 既存データを取得
    const {data,error}=await sbClient.from('match_data').select('data').eq('id','current').single();
    if(error)throw error;
    if(data&&data.data&&Object.keys(data.data).length>0){
      const remote=data.data;
      if(ourScore===0&&themScore===0&&sets.length===0){
        applyRemoteData(remote);
      }
    }
    syncEnabled=true;
    updateSyncUI('connected');
    // WebSocketの代わりに5秒ポーリング（Safari対応）
    startPolling();
  }catch(e){
    console.error('Supabase init error:',e);
    updateSyncUI('error');
  }
}


function startPolling(){
  if(pollingTimer)clearInterval(pollingTimer);
  pollingTimer=setInterval(async()=>{
    if(!syncEnabled||!sbClient||viewMode)return;
    try{
      const {data,error}=await sbClient.from('match_data').select('data,updated_at').eq('id','current').single();
      if(error||!data)return;
      // 更新があった場合のみ適用
      if(data.updated_at&&data.updated_at!==lastUpdatedAt){
        lastUpdatedAt=data.updated_at;
        // 自分が最後に更新したデータは無視（自分のpushと衝突しない）
        if(data.data&&Object.keys(data.data).length>0){
          applyRemoteData(data.data);
        }
      }
    }catch(e){
      console.error('polling error:',e);
    }
  },5000);
}

function applyRemoteData(remote){
  if(remote.ourTeamName){document.getElementById('our-team-name').value=remote.ourTeamName;}
  if(remote.themTeamName){document.getElementById('them-team-name').value=remote.themTeamName;}
  if(remote.tournament){document.getElementById('tournament-name').value=remote.tournament;}
  updateTeamNames();
  if(remote.sets!==undefined)sets=remote.sets;
  if(remote.ourScore!==undefined)ourScore=remote.ourScore;
  if(remote.themScore!==undefined)themScore=remote.themScore;
  if(remote.log!==undefined)log=remote.log;
  if(remote.ieData!==undefined)ieData=remote.ieData;
  if(remote.recvOk!==undefined){recvOk=remote.recvOk;const e=document.getElementById('recv-ok-val');if(e)e.textContent=recvOk;}
  if(remote.recvLoss!==undefined){recvLoss=remote.recvLoss;const e=document.getElementById('recv-loss-val');if(e)e.textContent=recvLoss;}
  if(remote.serveMode!==undefined)serveMode=remote.serveMode;
  if(remote.currentServerIdx!==undefined)currentServerIdx=remote.currentServerIdx;
  updateScore();updateSetHistory();
  if(currentTab==='ie')renderIE();
}

async function manualPush(){
  if(!syncEnabled||!sbClient){
    alert('Supabaseに接続されていません。合言葉を確認してください。');
    return;
  }
  await pushToSupabase();
  alert('保存しました！');
}

async function pushToSupabase(){
  if(!syncEnabled||!sbClient||viewMode)return;
  const payload={
    ourTeamName,themTeamName,
    tournament:document.getElementById('tournament-name').value||'',
    sets,ourScore,themScore,log,
    ieData,recvOk,recvLoss,
    serveMode,currentServerIdx,
    serveOrder,
  };
  try{
    const now=new Date().toISOString();
    const {error}=await sbClient.from('match_data').upsert({id:'current',data:payload,updated_at:now});
    if(error){
      console.error('push error:',error);
      updateSyncUI('error');
    } else {
      lastPushedAt=now;
    }
  }catch(e){
    console.error('push error:',e);
    updateSyncUI('error');
  }
}

function updateSyncUI(status){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(status==='connecting'){el.textContent='🔄 接続中...';el.style.color='#888';}
  else if(status==='connected'){el.textContent='🟢 同期中';el.style.color='#3B6D11';}
  else if(status==='view'){el.textContent='👁 閲覧中';el.style.color='#854F0B';el.style.textDecoration='none';el.style.cursor='default';}
  else{el.textContent='🔴 タップして接続';el.style.color='#A32D2D';}
}
